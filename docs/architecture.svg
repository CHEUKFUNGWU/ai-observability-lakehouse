    <stop offset="0%" stop-color="#5C6BC0"/>
    <stop offset="100%" stop-color="#3949AB"/>
  </linearGradient>
  <linearGradient id="titleBar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1A237E"/>
    <stop offset="100%" stop-color="#283593"/>
  </linearGradient>
</defs>

<!-- ==================== BACKGROUND ==================== -->
<rect width="1140" height="900" fill="#FAFBFC" rx="12"/>
<rect x="0.5" y="0.5" width="1139" height="899" fill="none" stroke="#E0E0E0" rx="12"/>

<!-- ==================== TITLE ==================== -->
<rect x="0" y="0" width="1140" height="65" rx="12" fill="url(#titleBar)"/>
<rect x="0" y="40" width="1140" height="25" fill="url(#titleBar)"/>
<text x="570" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF"
