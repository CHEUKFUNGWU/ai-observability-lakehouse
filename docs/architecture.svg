<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 900"
     font-family="'PingFang SC','Noto Sans SC','SF Pro Display',system-ui,sans-serif">

<defs>
  <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6Z" fill="#78909C"/>
  </marker>
  <marker id="ah-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6Z" fill="#C62828"/>
  </marker>
